<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Authenticating... | IRIS 365</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-surface: #fdf7ff;
            --color-surface-dim: #ded8e0;
            --color-surface-bright: #fdf7ff;
            --color-surface-container-lowest: #ffffff;
            --color-surface-container-low: #f8f2fa;
            --color-surface-container: #f2ecf4;
            --color-surface-container-high: #ece6ee;
            --color-surface-container-highest: #e6e0e9;
            --color-on-surface: #1d1b20;
            --color-on-surface-variant: #494551;
            --color-inverse-surface: #322f35;
            --color-inverse-on-surface: #f5eff7;
            --color-outline: #7a7582;
            --color-outline-variant: #cbc4d2;
            --color-surface-tint: #6750a4;
            --color-primary: #4f378a;
            --color-on-primary: #ffffff;
            --color-primary-container: #6750a4;
            --color-on-primary-container: #e0d2ff;
            --color-inverse-primary: #cfbcff;
            --color-secondary: #63597c;
            --color-on-secondary: #ffffff;
            --color-secondary-container: #e1d4fd;
            --color-on-secondary-container: #645a7d;
            --color-tertiary: #633b48;
            --color-on-tertiary: #ffffff;
            --color-tertiary-container: #7d5260;
            --color-on-tertiary-container: #ffcbda;
            --color-error: #ba1a1a;
            --color-on-error: #ffffff;
            --color-error-container: #ffdad6;
            --color-on-error-container: #93000a;
            --color-primary-fixed: #e9ddff;
            --color-primary-fixed-dim: #cfbcff;
            --color-on-primary-fixed: #22005d;
            --color-on-primary-fixed-variant: #4f378a;
            --color-background: #fdf7ff;
            --color-on-background: #1d1b20;
        }
        html.dark {
            --color-surface: #141218;
            --color-surface-dim: #141218;
            --color-surface-bright: #3b383e;
            --color-surface-container-lowest: #0f0d13;
            --color-surface-container-low: #1d1b20;
            --color-surface-container: #211f26;
            --color-surface-container-high: #2b2930;
            --color-surface-container-highest: #36343b;
            --color-on-surface: #e6e1e9;
            --color-on-surface-variant: #cac4d0;
            --color-inverse-surface: #e6e1e9;
            --color-inverse-on-surface: #322f35;
            --color-outline: #938f99;
            --color-outline-variant: #49454f;
            --color-surface-tint: #d0bcff;
            --color-primary: #d0bcff;
            --color-on-primary: #381e72;
            --color-primary-container: #4f378a;
            --color-on-primary-container: #e9ddff;
            --color-inverse-primary: #6750a4;
            --color-primary-fixed: #e9ddff;
            --color-primary-fixed-dim: #cfbcff;
            --color-on-primary-fixed: #22005d;
            --color-on-primary-fixed-variant: #4f378a;
            --color-background: #141218;
            --color-on-background: #e6e1e9;
        }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md text-center fade-in">
        <!-- Logo Badge -->
        <div class="flex justify-center mb-8">
            <div class="relative">
                <div class="absolute inset-0 rounded-full bg-primary/20 animate-ping" style="animation-duration: 2s;"></div>
                <div class="relative w-20 h-20 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-md">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">sync</span>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state">
            <h1 class="font-bold text-2xl text-on-surface mb-3" style="font-family: 'Roboto Flex', sans-serif;">Completing Authentication</h1>
            <p class="text-on-surface-variant mb-8" style="font-family: 'Roboto Flex', sans-serif;">Please wait while we securely log you in...</p>
            <div class="flex justify-center mb-8">
                <svg class="animate-spin h-10 w-10 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <p class="text-xs text-on-surface-variant/50">Redirecting to dashboard...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden">
            <div class="w-20 h-20 bg-error-container rounded-full flex items-center justify-center text-on-error-container mx-auto mb-6">
                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">error</span>
            </div>
            <h1 class="font-bold text-2xl text-on-surface mb-3" style="font-family: 'Roboto Flex', sans-serif;">Authentication Failed</h1>
            <p id="error-message" class="text-on-surface-variant mb-8" style="font-family: 'Roboto Flex', sans-serif;">Something went wrong during authentication.</p>
            <a href="index.html" class="inline-block px-8 py-4 bg-primary text-on-primary rounded-full font-medium shadow-sm hover:shadow-md active:scale-95 transition-all duration-300" style="font-family: 'Roboto Flex', sans-serif;">
                Return to Login
            </a>
        </div>
    </div>

    <script>
        (async function() {
            const url = localStorage.getItem('supabase_url') || 'https://bbramkluoytodpeaxlku.supabase.co';
            const key = localStorage.getItem('supabase_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJicmFta2x1b3l0b2RwZWF4bGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDk4NjgsImV4cCI6MjA5NTE4NTg2OH0.HtzuKmdRo8zZjeqa0zr53rfz6p5oXikkbohOGHjrp-c';

            const loadingState = document.getElementById('loading-state');
            const errorState = document.getElementById('error-state');
            const errorMessage = document.getElementById('error-message');

            if (!url || !key) {
                // No Supabase configured - use demo mode
                localStorage.setItem('user_email', 'user@iris365.edu');
                localStorage.setItem('user_name', 'User');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                return;
            }

            try {
                const supabaseClient = supabase.createClient(url, key, {
                    auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
                });

                // Check for errors in the URL query or hash params first
                const urlParams = new URLSearchParams(window.location.search);
                const queryError = urlParams.get('error_description') || urlParams.get('error');
                if (queryError) {
                    throw new Error(queryError);
                }

                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const hashError = hashParams.get('error_description') || hashParams.get('error');
                if (hashError) {
                    throw new Error(hashError);
                }

                // If a PKCE 'code' is present, exchange it for a session
                const code = urlParams.get('code');
                if (code) {
                    const { data: exchangeData, error: exchangeError } = await supabaseClient.auth.exchangeCodeForSession(code);
                    if (exchangeError) throw exchangeError;
                }

                // Retrieve session
                const { data, error } = await supabaseClient.auth.getSession();

                if (error) {
                    throw error;
                }

                if (data?.session) {
                    // Successfully authenticated
                    const user = data.session.user;
                    localStorage.setItem('user_email', user.email);
                    localStorage.setItem('user_name', user.user_metadata?.full_name || user.email?.split('@')[0] || 'User');
                    localStorage.setItem('supabase_user_email', user.email);

                    // Redirect to dashboard
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                } else {
                    // Check hash parameters manually for Implicit grant fallback
                    const accessToken = hashParams.get('access_token');
                    const type = hashParams.get('type');

                    if (accessToken && (type === 'recovery' || type === 'signup' || type === 'oauth')) {
                        const refreshToken = hashParams.get('refresh_token') || '';
                        const { data: sessionData, error: sessionError } = await supabaseClient.auth.setSession({
                            access_token: accessToken,
                            refresh_token: refreshToken
                        });

                        if (sessionError) throw sessionError;

                        if (sessionData?.session) {
                            const user = sessionData.session.user;
                            localStorage.setItem('user_email', user.email);
                            localStorage.setItem('user_name', user.user_metadata?.full_name || user.email?.split('@')[0] || 'User');
                            localStorage.setItem('supabase_user_email', user.email);
                            setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                            return;
                        }
                    }

                    // No session found — redirect to dashboard anyway (will be caught by guard)
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                }
            } catch (err) {
                console.error('Auth callback error:', err);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                errorMessage.textContent = err.message || 'Something went wrong during authentication.';
            }
        })();
    </script>
</body>
</html>
