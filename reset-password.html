<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password | IRIS 365</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-surface: #fdf7ff;
            --color-surface-dim: #ded8e0;
            --color-surface-bright: #fdf7ff;
            --color-surface-container-lowest: #ffffff;
            --color-surface-container-low: #f8f2fa;
            --color-surface-container: #f2ecf4;
            --color-surface-container-high: #ece6ee;
            --color-surface-container-highest: #e6e0e9;
            --color-on-surface: #1d1b20;
            --color-on-surface-variant: #494551;
            --color-inverse-surface: #322f35;
            --color-inverse-on-surface: #f5eff7;
            --color-outline: #7a7582;
            --color-outline-variant: #cbc4d2;
            --color-surface-tint: #6750a4;
            --color-primary: #4f378a;
            --color-on-primary: #ffffff;
            --color-primary-container: #6750a4;
            --color-on-primary-container: #e0d2ff;
            --color-inverse-primary: #cfbcff;
            --color-secondary: #63597c;
            --color-on-secondary: #ffffff;
            --color-secondary-container: #e1d4fd;
            --color-on-secondary-container: #645a7d;
            --color-tertiary: #633b48;
            --color-on-tertiary: #ffffff;
            --color-tertiary-container: #7d5260;
            --color-on-tertiary-container: #ffcbda;
            --color-error: #ba1a1a;
            --color-on-error: #ffffff;
            --color-error-container: #ffdad6;
            --color-on-error-container: #93000a;
            --color-primary-fixed: #e9ddff;
            --color-primary-fixed-dim: #cfbcff;
            --color-on-primary-fixed: #22005d;
            --color-on-primary-fixed-variant: #4f378a;
            --color-background: #fdf7ff;
            --color-on-background: #1d1b20;
        }
        html.dark {
            --color-surface: #141218;
            --color-surface-dim: #141218;
            --color-surface-bright: #3b383e;
            --color-surface-container-lowest: #0f0d13;
            --color-surface-container-low: #1d1b20;
            --color-surface-container: #211f26;
            --color-surface-container-high: #2b2930;
            --color-surface-container-highest: #36343b;
            --color-on-surface: #e6e1e9;
            --color-on-surface-variant: #cac4d0;
            --color-inverse-surface: #e6e1e9;
            --color-inverse-on-surface: #322f35;
            --color-outline: #938f99;
            --color-outline-variant: #49454f;
            --color-surface-tint: #d0bcff;
            --color-primary: #d0bcff;
            --color-on-primary: #381e72;
            --color-primary-container: #4f378a;
            --color-on-primary-container: #e9ddff;
            --color-inverse-primary: #6750a4;
            --color-primary-fixed: #e9ddff;
            --color-primary-fixed-dim: #cfbcff;
            --color-on-primary-fixed: #22005d;
            --color-on-primary-fixed-variant: #4f378a;
            --color-background: #141218;
            --color-on-background: #e6e1e9;
        }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .filled-input {
            border-bottom: 2px solid var(--color-outline);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .filled-input:focus {
            border-bottom-color: var(--color-primary);
            background-color: var(--color-primary-fixed-dim);
            outline: none;
        }
        .filled-input.error-state {
            border-bottom-color: var(--color-error) !important;
            background-color: var(--color-error-container) !important;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 selection:bg-primary-container selection:text-on-primary-container">
    <main class="w-full max-w-[400px]">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="relative">
                <div class="absolute inset-0 rounded-full bg-primary/20 animate-ping" style="animation-duration: 2s;"></div>
                <div class="relative w-20 h-20 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-md">
                    <span class="material-symbols-outlined text-3xl">lock_reset</span>
                </div>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="font-bold text-2xl text-on-surface mb-2" style="font-family: 'Roboto Flex', sans-serif;">Set New Password</h1>
            <p class="text-on-surface-variant" style="font-family: 'Roboto Flex', sans-serif;">Enter your new password below.</p>
        </div>

        <!-- Error / Success Toasts -->
        <div id="error-toast" class="hidden w-full mb-4 p-4 rounded-lg bg-error-container/90 border border-error/30 flex items-start gap-3 text-on-error-container" style="backdrop-filter: blur(8px);">
            <span class="material-symbols-outlined text-xl flex-shrink-0">error</span>
            <div class="text-sm font-body-md"><span id="error-toast-msg"></span></div>
        </div>
        <div id="success-toast" class="hidden w-full mb-4 p-4 rounded-lg bg-emerald-100 dark:bg-emerald-900/80 border border-emerald-400/30 flex items-start gap-3 text-emerald-800 dark:text-emerald-200" style="backdrop-filter: blur(8px);">
            <span class="material-symbols-outlined text-xl flex-shrink-0">check_circle</span>
            <div class="text-sm font-body-md"><span id="success-toast-msg"></span></div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden text-center py-12">
            <svg class="animate-spin h-10 w-10 text-primary mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-on-surface-variant">Verifying reset token...</p>
        </div>

        <!-- Reset Password Form -->
        <form id="reset-form" class="space-y-6">
            <div class="space-y-2">
                <label class="font-label-lg text-label-lg text-on-surface-variant ml-1" style="font-family: 'Roboto Flex', sans-serif;">New Password</label>
                <div class="relative">
                    <input id="new-password-input"
                        class="w-full px-4 py-4 bg-surface-container-low rounded-t-base filled-input text-on-surface"
                        placeholder="Minimum 6 characters" type="password" required minlength="6" style="font-family: 'Roboto Flex', sans-serif; font-size: 16px;" />
                    <span id="toggle-new-password"
                        class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-primary transition-colors">visibility</span>
                </div>
            </div>
            <div class="space-y-2">
                <label class="font-label-lg text-label-lg text-on-surface-variant ml-1" style="font-family: 'Roboto Flex', sans-serif;">Confirm Password</label>
                <div class="relative">
                    <input id="confirm-password-input"
                        class="w-full px-4 py-4 bg-surface-container-low rounded-t-base filled-input text-on-surface"
                        placeholder="Re-enter your new password" type="password" required minlength="6" style="font-family: 'Roboto Flex', sans-serif; font-size: 16px;" />
                    <span id="toggle-confirm-password"
                        class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-primary transition-colors">visibility</span>
                </div>
            </div>
            <button id="reset-btn" type="submit"
                class="w-full py-4 bg-primary text-on-primary rounded-full font-medium shadow-sm hover:shadow-md active:scale-95 transition-all duration-300 flex items-center justify-center gap-2"
                style="font-family: 'Roboto Flex', sans-serif; font-size: 14px;">
                <span>Update Password</span>
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-on-surface-variant" style="font-family: 'Roboto Flex', sans-serif;">
            <a href="index.html" class="text-primary font-bold hover:underline">Return to Login</a>
        </p>
    </main>

    <script>
        (async function() {
            const url = localStorage.getItem('supabase_url') || 'https://bbramkluoytodpeaxlku.supabase.co';
            const key = localStorage.getItem('supabase_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJicmFta2x1b3l0b2RwZWF4bGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDk4NjgsImV4cCI6MjA5NTE4NTg2OH0.HtzuKmdRo8zZjeqa0zr53rfz6p5oXikkbohOGHjrp-c';

            const loadingState = document.getElementById('loading-state');
            const resetForm = document.getElementById('reset-form');
            const newPasswordInput = document.getElementById('new-password-input');
            const confirmPasswordInput = document.getElementById('confirm-password-input');
            const resetBtn = document.getElementById('reset-btn');
            const errorToast = document.getElementById('error-toast');
            const errorToastMsg = document.getElementById('error-toast-msg');
            const successToast = document.getElementById('success-toast');
            const successToastMsg = document.getElementById('success-toast-msg');

            let supabaseClient = null;

            function showError(msg) {
                errorToastMsg.textContent = msg;
                errorToast.classList.remove('hidden');
                setTimeout(() => errorToast.classList.add('hidden'), 5000);
            }

            function showSuccess(msg) {
                successToastMsg.textContent = msg;
                successToast.classList.remove('hidden');
                setTimeout(() => successToast.classList.add('hidden'), 5000);
            }

            function triggerLoading(btn, text, cb) {
                const orig = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span>${text}</span>`;
                setTimeout(() => cb(orig), 500);
            }

            // Initialize Supabase
            if (url && key) {
                try {
                    supabaseClient = supabase.createClient(url, key, {
                        auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
                    });
                } catch (err) {
                    console.error("Supabase init error:", err);
                }
            }

            // Toggle password visibility
            document.getElementById('toggle-new-password').addEventListener('click', () => {
                const isPassword = newPasswordInput.type === 'password';
                newPasswordInput.type = isPassword ? 'text' : 'password';
                document.getElementById('toggle-new-password').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
            document.getElementById('toggle-confirm-password').addEventListener('click', () => {
                const isPassword = confirmPasswordInput.type === 'password';
                confirmPasswordInput.type = isPassword ? 'text' : 'password';
                document.getElementById('toggle-confirm-password').textContent = isPassword ? 'visibility_off' : 'visibility';
            });

            // Theme toggle (mirror index.html setting)
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            }

            // Form submit
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (newPassword.length < 6) {
                    showError('Password must be at least 6 characters.');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showError('Passwords do not match.');
                    return;
                }

                if (!supabaseClient) {
                    showError('Please configure your Supabase database first via the login page.');
                    return;
                }

                triggerLoading(resetBtn, 'Updating...', async (originalHTML) => {
                    try {
                        // Check for errors in the URL query parameters first
                        const urlParams = new URLSearchParams(window.location.search);
                        const queryError = urlParams.get('error_description') || urlParams.get('error');
                        if (queryError) {
                            throw new Error(queryError);
                        }

                        // Check if a PKCE 'code' is present
                        const code = urlParams.get('code');
                        if (code) {
                            const { data: sessionData, error: sessionError } = await supabaseClient.auth.exchangeCodeForSession(code);
                            if (sessionError) throw sessionError;
                        } else {
                            // Fallback to URL hash session token setting (Implicit grant flow)
                            const hashParams = new URLSearchParams(window.location.hash.substring(1));
                            const accessToken = hashParams.get('access_token');
                            const refreshToken = hashParams.get('refresh_token');
                            const type = hashParams.get('type');

                            if ((type === 'recovery' || type === 'invite') && accessToken) {
                                const { data: sessionData, error: sessionError } = await supabaseClient.auth.setSession({
                                    access_token: accessToken,
                                    refresh_token: refreshToken || ''
                                });

                                if (sessionError) throw sessionError;
                            }
                        }

                        // Now update the password
                        const { error } = await supabaseClient.auth.updateUser({
                            password: newPassword
                        });

                        if (error) throw error;

                        showSuccess('Password updated successfully! Redirecting to login...');
                        resetBtn.disabled = false;
                        resetBtn.innerHTML = originalHTML;

                        // Sign out and redirect to login
                        setTimeout(async () => {
                            await supabaseClient.auth.signOut();
                            window.location.href = 'index.html';
                        }, 2000);

                    } catch (err) {
                        showError(err.message || 'Could not update password. The reset link may have expired.');
                        resetBtn.disabled = false;
                        resetBtn.innerHTML = originalHTML;
                    }
                });
            });
        })();
    </script>
</body>
</html>
